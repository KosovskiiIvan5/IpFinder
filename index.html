<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP и страна</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
            text-align: center;
            transition: 0.3s;
        }

        .container {
            margin-top: 40px;
        }

        .card {
            width: 400px;
            margin: auto;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            color: white;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        h1 {
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            margin: 10px 0;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            background: white;
            color: #333;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        img {
            margin-top: 10px;
            border-radius: 10px;
        }

        iframe {
            margin-top: 20px;
            border-radius: 15px;
            border: none;
        }

        .dark {
            background: linear-gradient(135deg, #232526, #414345);
        }

        .dark .card {
            background: rgba(0,0,0,0.4);
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>🌍 Определение IP</h1>

        <p><b>IP:</b> <span id="ip">...</span></p>

        <p><b>Страна:</b> <span id="country">...</span></p>

        <img id="flag" width="100">

        <p><b>Регион:</b> <span id="region">...</span></p>

        <p><b>Провайдер:</b> <span id="provider">...</span></p>

        <p><b>Координаты:</b> <span id="location">...</span></p>

        <p id="time"></p>

        <button onclick="getInfo()">
            🔄 Повторить запрос
        </button>

        <button onclick="toggleTheme()">
            🌙 Сменить тему
        </button>

        <br>

        <iframe
            id="map"
            width="320"
            height="220">
        </iframe>

    </div>

</div>

<script>

async function getInfo() {

    try {

        document.getElementById('ip').innerText =
            'Загрузка...';

        const response =
            await fetch('https://ipinfo.io/json');

        const data =
            await response.json();

        document.getElementById('ip').innerText =
            data.ip;

        document.getElementById('country').innerText =
            data.country;

        document.getElementById('region').innerText =
            data.region;

        document.getElementById('provider').innerText =
            data.org;

        document.getElementById('location').innerText =
            data.loc;

        document.getElementById('flag').src =
            `https://flagsapi.com/${data.country}/flat/64.png`;

        document.getElementById('map').src =
            `https://maps.google.com/maps?q=${data.loc}&z=10&output=embed`;

        document.getElementById('time').innerText =
            "Последнее обновление: " +
            new Date().toLocaleTimeString();

    }

    catch(error) {

        alert('Ошибка получения данных');

        console.log(error);
    }
}

function toggleTheme() {

    document.body.classList.toggle('dark');
}

getInfo();

</script>

</body>
</html>
